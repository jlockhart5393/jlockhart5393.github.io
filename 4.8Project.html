<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    Author: Jeremy Lockhart
    Date: 03-01-2026
    Assignment: Interactive Portfolio Update

    Purpose:
    - Replace prompt with a welcome modal
    - Add tooltip to submit button
    - Save dark mode preference
    - Improve structure using external JavaScript file
  -->

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeremy Lockhart - Interactive Portfolio</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      line-height: 1.5;
    }

    header {
      padding: 16px;
      border-bottom: 1px solid #ccc;
    }

    main {
      padding: 16px;
    }

    section {
      margin-bottom: 28px;
    }

    .notifyBar {
      padding: 10px 16px;
      border-bottom: 1px solid #ccc;
      background: #fff8d6;
    }

    .highlightBox {
      border: 2px dashed #777;
      padding: 10px;
      border-radius: 8px;
    }

    .dark-mode {
      background: #111;
      color: #f5f5f5;
    }

    /* Modal */
    .modalOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modalBox {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    .hidden {
      display: none;
    }

    /* Tooltip */
    .tipWrap {
      position: relative;
      display: inline-block;
    }

    .tipWrap .tipText {
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s;
      position: absolute;
      bottom: 130%;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: nowrap;
      font-size: 0.9em;
    }

    .tipWrap:hover .tipText {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>

<body>

<header>
  <label>
    <input type="checkbox" id="darkToggle">
    Dark Mode
  </label>

  <h1>Jeremy Lockhart - Personal Portfolio</h1>
  <p>Welcome!</p>
</header>

<main>

  <section id="about">
    <h2>About</h2>
    <p>
      I am an IT professional and Cloud Engineer with experience in infrastructure and cybersecurity.
    </p>
  </section>

  <section id="projects">
    <h2>Projects</h2>
  </section>

  <section id="contact">
    <h2>Contact</h2>

    <form id="contactForm">
      <label>
        Name:
        <input type="text" id="senderName">
      </label>
      <br><br>

      <label>
        Email:
        <input type="email" id="senderEmail">
      </label>
      <br><br>

      <label>
        Message:
        <br>
        <textarea id="message" rows="5"></textarea>
      </label>
      <br><br>

      <span class="tipWrap">
        <input type="submit" value="Submit">
        <span class="tipText">Click to send your message!</span>
      </span>
    </form>
  </section>

</main>

<!-- Welcome Modal -->
<div id="welcomeModal" class="modalOverlay hidden">
  <div class="modalBox">
    <h2>Heads Up</h2>
    <p>This page is a work in progress.</p>
    <button id="closeModalBtn">Close</button>
  </div>
</div>

<!-- External JavaScript -->
<script src="4.8script.js"></script>

</body>
</html>
