<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    Name: Jeremy Lockhart
    Date: 03-01-2026
    Assignment: Portfolio with Custom Objects

    Purpose:
    - Store project objects
    - Save them using sessionStorage
    - Load and display them dynamically
    - Keep projects in rows of 6
  -->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeremy Lockhart Portfolio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 16px;
      border-bottom: 1px solid #ccc;
    }

    main {
      padding: 16px;
      max-width: 1400px; /* widened so 6 cards fit */
      margin-left: 0;
      margin-right: auto;
    }

    section {
      margin-bottom: 30px;
      text-align: left;
    }

    /* =========================
       Projects Styling (6 per row)
       ========================= */
    .projectGrid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 15px;
    }

    .projectCard {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 12px;
      text-align: left;
    }

    .projectCard img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
    }

    .projectLink {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border: 1px solid #444;
      border-radius: 6px;
      text-decoration: none;
    }

    /* =========================
       Form Styling
       ========================= */
    form div {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #aaa;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid #444;
      cursor: pointer;
    }

    /* =========================
       Dark Mode
       ========================= */
    .dark-mode {
      background: #111;
      color: #f5f5f5;
    }

    .dark-mode input,
    .dark-mode textarea {
      background: #222;
      color: #f5f5f5;
      border: 1px solid #555;
    }

    /* =========================
       Modal
       ========================= */
    .modalOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modalBox {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    /* =========================
       Tooltip
       ========================= */
    .tooltip {
      position: relative;
      display: inline-block;
    }

    .tooltipText {
      visibility: hidden;
      background: black;
      color: white;
      padding: 5px;
      border-radius: 6px;
      position: absolute;
      bottom: 125%;
      left: 50%;
      margin-left: -75px;
      width: 150px;
      text-align: center;
      font-size: 0.8em;
    }

    .tooltip:hover .tooltipText {
      visibility: visible;
    }

  </style>
</head>

<body>

<header>
  <h1>Jeremy Lockhart - Portfolio</h1>

  <label>
    <input type="checkbox" id="darkToggle">
    Dark Mode
  </label>
</header>

<main>

<section id="about">
  <h2>About</h2>
  <p>This portfolio loads projects dynamically using JavaScript objects.</p>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div id="projectList"></div>
</section>

<section id="contact">
  <h2>Contact</h2>

  <form id="contactForm">
    <div>
      <label for="fullName">Full Name:</label>
      <input type="text" id="fullName">
    </div>

    <div>
      <label for="email">Email:</label>
      <input type="email" id="email">
    </div>

    <div>
      <label for="message">Message:</label>
      <textarea id="message"></textarea>
    </div>

    <div>
      <span class="tooltip">
        <button type="submit">Send Message</button>
        <span class="tooltipText">This simulates sending a message</span>
      </span>
    </div>
  </form>

  <p id="formStatus"></p>
</section>

</main>

<script src="script.js"></script>

</body>
</html>
