<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    Author: Jeremy Lockhart
    Date: 03-01-2026
    Assignment: Interactive Portfolio Update

    Purpose:
      - Make my portfolio more interactive
      - Add new content to the page using JavaScript
      - Change some existing sections using selectors
      - Show a fake “sending message…” delay when the form is submitted
  -->

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeremy Lockhart - Interactive Portfolio</title>

  <style>
    /* Basic page styling */
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      line-height: 1.5;
    }

    header {
      padding: 16px;
      border-bottom: 1px solid #ccc;
    }

    main {
      padding: 16px;
    }

    section {
      margin-bottom: 28px;
    }

    /* This bar gets added dynamically after a delay */
    .notifyBar {
      padding: 10px 16px;
      border-bottom: 1px solid #ccc;
      background: #fff8d6;
    }

    /* Used for the new paragraph we add with JS */
    .highlightBox {
      border: 2px dashed #777;
      padding: 10px;
      border-radius: 8px;
    }

    /* Simple dark mode styling */
    .dark-mode {
      background: #111;
      color: #f5f5f5;
    }
  </style>
</head>

<body>

<header>
  <!-- Dark mode checkbox -->
  <label>
    <input type="checkbox" id="darkToggle">
    Dark Mode
  </label>

  <h1>Jeremy Lockhart - Personal Portfolio</h1>
  <p id="welcomeMsg">Welcome!</p>
</header>

<main>

  <!-- ABOUT SECTION -->
  <section id="about">
    <h2>About</h2>
    <p>
      I am an IT professional and Cloud Engineer with experience in infrastructure and cybersecurity.
    </p>
  </section>

  <!-- PROJECTS SECTION -->
  <section id="projects">
    <h2>Projects</h2>
  </section>

  <!-- CONTACT SECTION -->
  <section id="contact">
    <h2>Contact</h2>

    <form id="contactForm">
      <label>
        Name:
        <input type="text" id="senderName">
      </label>
      <br><br>

      <label>
        Email:
        <input type="email" id="senderEmail">
      </label>
      <br><br>

      <label>
        Message:
        <br>
        <textarea id="message" rows="5"></textarea>
      </label>
      <br><br>

      <input type="submit" value="Submit">
    </form>
  </section>

</main>

<script>

  /* =========================
     Add a delayed notification
     ========================= */

  // After about 1 second, show a message at the top of the page
  setTimeout(function () {
    var note = document.createElement("div");
    note.className = "notifyBar";
    note.innerText = "This page updates dynamically using JavaScript.";
    
    // Put it at the very top of the page
    document.body.insertBefore(note, document.body.firstChild);
  }, 1200);



  /* =========================
     Dynamically add content
     ========================= */

  // Grab the Projects section
  var projectsSection = document.getElementById("projects");

  // Create a new paragraph
  var newParagraph = document.createElement("p");
  newParagraph.className = "highlightBox";
  newParagraph.innerText =
    "Recent Project: Daily Water Tracker (Android App). Built using Kotlin and Android Studio.";

  // Add it to the Projects section
  projectsSection.appendChild(newParagraph);



  /* =========================
     Modify existing elements
     ========================= */

  // Change the Projects heading text
  var projectsHeading = document.querySelector("#projects h2");
  projectsHeading.innerText = "Projects (Updated with JavaScript)";

  // Slightly style the About section so it stands out
  var aboutSection = document.getElementById("about");
  aboutSection.style.backgroundColor = "#f0f8ff";
  aboutSection.style.padding = "12px";
  aboutSection.style.borderRadius = "8px";



  /* =========================
     Dark Mode Toggle
     ========================= */

  // When checkbox changes, toggle dark mode class
  document.getElementById("darkToggle")
    .addEventListener("change", function () {
      document.body.classList.toggle("dark-mode");
    });



  /* =========================
     Timed Form Submission
     ========================= */

  // Grab the contact form
  var contactForm = document.getElementById("contactForm");

  // When form is submitted
  contactForm.addEventListener("submit", function (event) {

    // Stop the normal form submission
    event.preventDefault();

    // Check if a status message already exists
    var statusMsg = document.getElementById("formStatus");

    // If not, create one
    if (!statusMsg) {
      statusMsg = document.createElement("p");
      statusMsg.id = "formStatus";
      contactForm.appendChild(statusMsg);
    }

    // Show a fake "sending" message
    statusMsg.innerText = "Sending message...";

    // After about 2.5 seconds, show success
    setTimeout(function () {

      statusMsg.innerText = "Message sent successfully!";

      // Clear the form fields
      document.getElementById("senderName").value = "";
      document.getElementById("senderEmail").value = "";
      document.getElementById("message").value = "";

    }, 2500);
  });

</script>

</body>
</html>
